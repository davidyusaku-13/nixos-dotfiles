name: Build and Release Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          
      - name: Build Installer
        run: |
          cd installer
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o ../nixos-installer main.go
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: nixos-installer
          generate_release_notes: true
